services:
  db:
    image: pgvector/pgvector:pg16
    container_name: devsync_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: devsync
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d devsync"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: devsync_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devsync_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/devsync
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=devsync_super_secret_jwt_key_32_bytes_min
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3.2:3b
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started

  ollama:
    image: ollama/ollama:latest
    container_name: devsync_ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  ollama-pull-model:
    image: ollama/ollama:latest
    container_name: devsync_ollama_pull
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: /bin/sh
    command: >
      -c "
      until ollama list >/dev/null 2>&1; do
        echo 'Waiting for Ollama service...'
        sleep 2
      done
      echo 'Ollama service is up, pulling model llama3.2:3b...'
      ollama pull llama3.2:3b
      "
    depends_on:
      - ollama

volumes:
  postgres_data:
  redis_data:
  ollama_data:
